[build]
  base = "studio"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  API_URL = "https://indianopinions-indianopinions.up.railway.app"
  NEXT_PUBLIC_API_URL = "https://indianopinions-indianopinions.up.railway.app"
  NEXT_PUBLIC_ADMIN_URL = "https://indianopinions.com/sign-in"

# Proxy Laravel admin + assets through the public domain (sign-in is served by Next.js)
[[redirects]]
  from = "/admin/login"
  to = "/sign-in"
  status = 302

[[redirects]]
  from = "/login"
  to = "https://indianopinions-indianopinions.up.railway.app/login"
  status = 200
  force = true

[[redirects]]
  from = "/logout"
  to = "https://indianopinions-indianopinions.up.railway.app/logout"
  status = 200
  force = true

[[redirects]]
  from = "/build/*"
  to = "https://indianopinions-indianopinions.up.railway.app/build/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/storage/*"
  to = "https://indianopinions-indianopinions.up.railway.app/storage/:splat"
  status = 200
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"
