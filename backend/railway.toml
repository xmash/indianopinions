# Config file path in Railway: /backend/railway.toml
# Root Directory: backend
#
# watchPatterns intentionally omitted — Watch Paths must stay EMPTY (not backend/**).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/entrypoint.sh"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
